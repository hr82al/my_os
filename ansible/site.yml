---
# my_os system apps
# Installs desktop applications on a freshly-preseeded Debian 13 system.
# Run:  sudo ansible-playbook -i inventory.ini site.yml
# Check (dry-run): sudo ansible-playbook -i inventory.ini site.yml --check
# Single app only: sudo ansible-playbook -i inventory.ini site.yml --tags vscode

- name: Install system apps
  hosts: local
  become: true
  gather_facts: true

  # Опционально — маршрутизация внешних downloads через privoxy (HTTP→SOCKS5
  # на 127.0.0.1:2080). По умолчанию ВЫКЛ: требует настроенного throne со
  # subscription. Включить: `ansible-playbook ... -e use_proxy=true` ПОСЛЕ
  # настройки throne (`./bootstrap.sh ansible --tags privoxy` + настройка throne).
  environment:
    HTTPS_PROXY: "{{ (use_proxy | default(false) | bool) | ternary('http://127.0.0.1:8118', '') }}"
    HTTP_PROXY:  "{{ (use_proxy | default(false) | bool) | ternary('http://127.0.0.1:8118', '') }}"
    NO_PROXY: "localhost,127.0.0.1,::1,.local"

  # Больший таймаут на сетевые модули: дефолтные 10s мало для крупных
  # .deb/tarball/AppImage и медленных соединений.
  module_defaults:
    ansible.builtin.get_url:
      timeout: 60
    ansible.builtin.uri:
      timeout: 30

  pre_tasks:
    # -----------------------------------------------------------------------
    # Auto-cleanup: удалить легаси apt-артефакты от предыдущих версий ansible.
    # Ранее мы создавали свой /etc/apt/keyrings/microsoft.asc + свой
    # vscode.list с этим путём — это конфликтует с postinst `code` пакета
    # который использует /usr/share/keyrings/microsoft.gpg.
    # Условие: чистим ТОЛЬКО если наш старый keyring существует (признак
    # «мусора от прошлых runs»). После первого прогона postinst создаст
    # свой корректный vscode.list — его мы НЕ трогаем на последующих runs.
    # -----------------------------------------------------------------------
    - name: Cleanup | check for legacy microsoft.asc keyring
      ansible.builtin.stat:
        path: /etc/apt/keyrings/microsoft.asc
      register: legacy_ms_key
      tags: [always, cleanup-legacy]

    - name: Cleanup | find VS Code apt-sources referencing legacy keyring
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d/
        patterns:
          - "vscode*"
          - "code*"
        contains: ".*/etc/apt/keyrings/microsoft\\.asc.*"
      register: legacy_vscode_sources
      when: legacy_ms_key.stat.exists
      tags: [always, cleanup-legacy]

    - name: Cleanup | remove conflicting VS Code apt sources
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ legacy_vscode_sources.files | default([]) }}"
      when: legacy_ms_key.stat.exists
      tags: [always, cleanup-legacy]

    - name: Cleanup | remove legacy microsoft.asc
      ansible.builtin.file:
        path: /etc/apt/keyrings/microsoft.asc
        state: absent
      when: legacy_ms_key.stat.exists
      tags: [always, cleanup-legacy]

  tasks:

    # -----------------------------------------------------------------------
    # Apps from Debian main repository — simplest case
    # -----------------------------------------------------------------------
    - name: Debian-repo apps (libreoffice, pgcli)
      ansible.builtin.apt:
        name:
          - libreoffice          # офисный пакет
          - pgcli                 # CLI PG-client с magic autocomplete (~30 MB RAM)
        state: present
        update_cache: true
      tags: [debian-repo, libreoffice, pgcli]

    # -----------------------------------------------------------------------
    # VS Code — прямой .deb (Microsoft direct download).
    # Postinst-скрипт .deb сам настраивает apt-source + GPG-key для будущих
    # обновлений через обычный `apt upgrade`. Не создаём свой
    # sources.list.d/vscode.list чтобы избежать Signed-By conflict.
    # -----------------------------------------------------------------------
    - name: VS Code | download latest .deb (Microsoft direct link)
      ansible.builtin.get_url:
        url: https://go.microsoft.com/fwlink/?LinkID=760868
        dest: /tmp/vscode.deb
        mode: "0644"
      tags: [vscode]

    - name: VS Code | install
      ansible.builtin.apt:
        deb: /tmp/vscode.deb
      tags: [vscode]

    # -----------------------------------------------------------------------
    # DbGate — современный SQL-клиент (Electron, ~108 MB .deb).
    # Поддерживает PG, MySQL, SQLite, Oracle, MongoDB, Redis, ClickHouse.
    # Легче чем DBeaver (JVM), сравнимый по автодополнению.
    # Asset naming: dbgate-<version>-linux_amd64.deb или dbgate-latest.deb
    # -----------------------------------------------------------------------
    - name: DbGate | query latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/dbgate/dbgate/releases/latest
        return_content: true
      register: dbgate_release
      tags: [dbgate]

    - name: DbGate | resolve linux_amd64 .deb URL
      ansible.builtin.set_fact:
        dbgate_deb_url: >-
          {{
            dbgate_release.json.assets
            | selectattr('name', 'match', 'dbgate-[0-9].*-linux_amd64\.deb$')
            | map(attribute='browser_download_url')
            | first
          }}
      tags: [dbgate]

    - name: DbGate | download .deb
      ansible.builtin.get_url:
        url: "{{ dbgate_deb_url }}"
        dest: /tmp/dbgate.deb
        mode: "0644"
      tags: [dbgate]

    - name: DbGate | install
      ansible.builtin.apt:
        deb: /tmp/dbgate.deb
      tags: [dbgate]

    - name: DbGate | symlink to /usr/local/bin (для терминала)
      ansible.builtin.file:
        src: /opt/DbGate/dbgate
        dest: /usr/local/bin/dbgate
        state: link
      tags: [dbgate]

    # -----------------------------------------------------------------------
    # Obsidian — latest .deb from GitHub releases
    # -----------------------------------------------------------------------
    - name: Obsidian | query latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest
        return_content: true
      register: obsidian_release
      tags: [obsidian]

    - name: Obsidian | resolve amd64 .deb URL
      ansible.builtin.set_fact:
        obsidian_deb_url: >-
          {{
            obsidian_release.json.assets
            | selectattr('name', 'match', 'obsidian_.*_amd64\.deb$')
            | map(attribute='browser_download_url')
            | first
          }}
      tags: [obsidian]

    - name: Obsidian | download .deb
      ansible.builtin.get_url:
        url: "{{ obsidian_deb_url }}"
        dest: /tmp/obsidian.deb
        mode: "0644"
      tags: [obsidian]

    - name: Obsidian | install
      ansible.builtin.apt:
        deb: /tmp/obsidian.deb
      tags: [obsidian]

    - name: Obsidian | symlink to /usr/local/bin (для терминала)
      ansible.builtin.file:
        src: /opt/Obsidian/obsidian
        dest: /usr/local/bin/obsidian
        state: link
      tags: [obsidian]

    # -----------------------------------------------------------------------
    # chezmoi — dotfiles manager; latest .deb from GitHub releases
    # (not in Debian main, so it can't go in preseed pkgsel/include)
    # -----------------------------------------------------------------------
    - name: chezmoi | query latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/twpayne/chezmoi/releases/latest
        return_content: true
      register: chezmoi_release
      tags: [chezmoi]

    - name: chezmoi | resolve amd64 .deb URL
      ansible.builtin.set_fact:
        chezmoi_deb_url: >-
          {{
            chezmoi_release.json.assets
            | selectattr('name', 'match', 'chezmoi_.*_linux_amd64\.deb$')
            | map(attribute='browser_download_url')
            | first
          }}
      tags: [chezmoi]

    - name: chezmoi | download .deb
      ansible.builtin.get_url:
        url: "{{ chezmoi_deb_url }}"
        dest: /tmp/chezmoi.deb
        mode: "0644"
      tags: [chezmoi]

    - name: chezmoi | install
      ansible.builtin.apt:
        deb: /tmp/chezmoi.deb
      tags: [chezmoi]

    # -----------------------------------------------------------------------
    # Bruno — latest .deb from GitHub releases
    # -----------------------------------------------------------------------
    - name: Bruno | query latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/usebruno/bruno/releases/latest
        return_content: true
      register: bruno_release
      tags: [bruno]

    - name: Bruno | resolve amd64 .deb URL
      ansible.builtin.set_fact:
        bruno_deb_url: >-
          {{
            bruno_release.json.assets
            | selectattr('name', 'match', 'bruno_.*_amd64_linux\.deb$')
            | map(attribute='browser_download_url')
            | first
          }}
      tags: [bruno]

    - name: Bruno | download .deb
      ansible.builtin.get_url:
        url: "{{ bruno_deb_url }}"
        dest: /tmp/bruno.deb
        mode: "0644"
      tags: [bruno]

    - name: Bruno | install
      ansible.builtin.apt:
        deb: /tmp/bruno.deb
      tags: [bruno]

    - name: Bruno | symlink to /usr/local/bin (для терминала)
      ansible.builtin.file:
        src: /opt/Bruno/bruno
        dest: /usr/local/bin/bruno
        state: link
      tags: [bruno]

    # -----------------------------------------------------------------------
    # Throne — SOCKS5/VPN proxy client; portable zip в ~/mr/apps/Throne.
    # Provides the local SOCKS5 on 127.0.0.1:2080 which privoxy wraps.
    #
    # Почему zip а не .deb: upstream .deb кладёт файлы в /opt/Throne и запускает
    # postinst-скрипты; portable zip — просто распаковка в user home, config/
    # рядом с бинарём пишется самим приложением (без root), проще обновлять
    # (снести папку и распаковать новую версию).
    # Asset naming: Throne-<version>-linux-amd64.zip (top-level dir `Throne/`).
    # -----------------------------------------------------------------------
    - name: Throne | ensure unzip is installed (required for unarchive .zip)
      ansible.builtin.apt:
        name: unzip
        state: present
      tags: [throne]

    - name: Throne | ensure ~/mr/apps exists (owner user)
      ansible.builtin.file:
        path: /home/user/mr/apps
        state: directory
        owner: user
        group: user
        mode: "0755"
      tags: [throne]

    - name: Throne | query latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/throneproj/Throne/releases/latest
        return_content: true
      register: throne_release
      tags: [throne]

    - name: Throne | resolve linux-amd64.zip URL
      ansible.builtin.set_fact:
        throne_zip_url: >-
          {{
            throne_release.json.assets
            | selectattr('name', 'match', 'Throne-.*-linux-amd64\.zip$')
            | map(attribute='browser_download_url')
            | first
          }}
      tags: [throne]

    - name: Throne | download zip
      ansible.builtin.get_url:
        url: "{{ throne_zip_url }}"
        dest: /tmp/throne.zip
        mode: "0644"
      tags: [throne]

    - name: Throne | extract to ~/mr/apps (creates Throne/ subdir)
      ansible.builtin.unarchive:
        src: /tmp/throne.zip
        dest: /home/user/mr/apps
        remote_src: true
        owner: user
        group: user
        # Не ставим `creates:` — нужно перезаписывать при апдейте версии.
      tags: [throne]

    - name: Throne | ensure extracted tree owned by user
      ansible.builtin.file:
        path: /home/user/mr/apps/Throne
        state: directory
        owner: user
        group: user
        recurse: true
      tags: [throne]

    - name: Throne | symlink to /usr/local/bin/throne (для терминала)
      ansible.builtin.file:
        src: /home/user/mr/apps/Throne/Throne
        dest: /usr/local/bin/throne
        state: link
      tags: [throne]

    - name: Throne | desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/throne.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Throne
          Comment=SOCKS5/VPN proxy client
          Exec=/home/user/mr/apps/Throne/Throne
          Icon=/home/user/mr/apps/Throne/Throne.png
          Terminal=false
          Type=Application
          Categories=Network;
          StartupWMClass=Throne
      tags: [throne]

    # -----------------------------------------------------------------------
    # Telegram Desktop — tarball into /opt.
    # Primary source: GitHub releases `telegramdesktop/tdesktop` — asset
    # `tsetup.<version>.tar.xz` (те же самые официальные сборки что на
    # telegram.org). GitHub reliably доступен где telegram.org заблокирован.
    # Fallback: pre-downloaded ~/Downloads/offline/telegram.tar.xz
    # (для случая если и GitHub недоступен — редко).
    # -----------------------------------------------------------------------
    - name: Telegram | install
      vars:
        telegram_local_path: /home/user/Downloads/offline/telegram.tar.xz
      block:
        - name: Telegram | check for pre-downloaded tarball
          ansible.builtin.stat:
            path: "{{ telegram_local_path }}"
          register: telegram_local

        - name: Telegram | use pre-downloaded tarball (если есть)
          ansible.builtin.copy:
            src: "{{ telegram_local_path }}"
            dest: /tmp/telegram.tar.xz
            mode: "0644"
            remote_src: true
          when: telegram_local.stat.exists

        - name: Telegram | query latest GitHub release
          ansible.builtin.uri:
            url: https://api.github.com/repos/telegramdesktop/tdesktop/releases/latest
            return_content: true
          register: telegram_release
          when: not telegram_local.stat.exists

        - name: Telegram | resolve tsetup.tar.xz URL
          ansible.builtin.set_fact:
            telegram_tar_url: >-
              {{
                telegram_release.json.assets
                | selectattr('name', 'match', 'tsetup\.[0-9.]+\.tar\.xz$')
                | map(attribute='browser_download_url')
                | first
              }}
          when: not telegram_local.stat.exists

        - name: Telegram | download from GitHub
          ansible.builtin.get_url:
            url: "{{ telegram_tar_url }}"
            dest: /tmp/telegram.tar.xz
            mode: "0644"
          when: not telegram_local.stat.exists

        - name: Telegram | extract to /opt
          ansible.builtin.unarchive:
            src: /tmp/telegram.tar.xz
            dest: /opt
            remote_src: true
            creates: /opt/Telegram/Telegram

        - name: Telegram | symlink to /usr/local/bin
          ansible.builtin.file:
            src: /opt/Telegram/Telegram
            dest: /usr/local/bin/telegram-desktop
            state: link

        - name: Telegram | desktop entry
          ansible.builtin.copy:
            dest: /usr/share/applications/telegram-desktop.desktop
            mode: "0644"
            content: |
              [Desktop Entry]
              Name=Telegram Desktop
              Comment=Official messaging app
              Exec=/opt/Telegram/Telegram -- %u
              Icon=telegram
              Terminal=false
              Type=Application
              Categories=Network;InstantMessaging;Qt;
              MimeType=x-scheme-handler/tg;
              StartupWMClass=TelegramDesktop
      rescue:
        - name: Telegram | install failed — warn & continue
          ansible.builtin.debug:
            msg: |
              ⚠️  Telegram install failed. Альтернативы:

              1. Проверить что GitHub доступен:
                   curl -I https://github.com/telegramdesktop/tdesktop/releases/latest

              2. Pre-download на dev-машине:
                   curl -L -o ~/Downloads/offline/telegram.tar.xz \
                     $(curl -s https://api.github.com/repos/telegramdesktop/tdesktop/releases/latest \
                       | jq -r '.assets[] | select(.name | test("tsetup\\.[0-9.]+\\.tar\\.xz$")) | .browser_download_url')
                   # перенести ~/Downloads/offline/ на целевую машину, повторить:
                   sudo ansible-playbook ... --tags telegram

              3. После настройки throne + privoxy:
                   sudo ansible-playbook ... --tags telegram -e use_proxy=true
      tags: [telegram]

    # -----------------------------------------------------------------------
    # Postman — tarball into /opt + symlink + .desktop entry
    # -----------------------------------------------------------------------
    - name: Postman | download tarball
      ansible.builtin.get_url:
        url: https://dl.pstmn.io/download/latest/linux_64
        dest: /tmp/postman.tar.gz
        mode: "0644"
      tags: [postman]

    - name: Postman | extract to /opt
      ansible.builtin.unarchive:
        src: /tmp/postman.tar.gz
        dest: /opt
        remote_src: true
        creates: /opt/Postman/Postman
      tags: [postman]

    - name: Postman | symlink to /usr/local/bin
      ansible.builtin.file:
        src: /opt/Postman/Postman
        dest: /usr/local/bin/postman
        state: link
      tags: [postman]

    - name: Postman | desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/postman.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Postman
          Exec=/opt/Postman/Postman
          Icon=/opt/Postman/app/resources/app/assets/icon.png
          Type=Application
          Categories=Development;
      tags: [postman]

    # -----------------------------------------------------------------------
    # Redis Insight — AppImage into /opt + .desktop entry
    # (no official .deb for Redis Insight 2.x)
    # -----------------------------------------------------------------------
    - name: Redis Insight | download AppImage
      ansible.builtin.get_url:
        # URL меняется: раньше был /latest/RedisInsight-..., теперь /latest-v3/Redis-Insight-...
        # Источник актуального URL: https://redis.io/downloads/
        url: https://s3.amazonaws.com/redisinsight.download/public/latest-v3/Redis-Insight-linux-x86_64.AppImage
        dest: /opt/RedisInsight.AppImage
        mode: "0755"
      tags: [redisinsight]

    - name: Redis Insight | desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/redisinsight.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Redis Insight
          Exec=/opt/RedisInsight.AppImage
          Icon=redisinsight
          Type=Application
          Categories=Development;
      tags: [redisinsight]

    # -----------------------------------------------------------------------
    # User bashrc — with-proxy helper for running commands via privoxy
    # Usage: with-proxy curl https://...  |  with-proxy apt-get install ...
    # -----------------------------------------------------------------------
    - name: bashrc | with-proxy function
      ansible.builtin.blockinfile:
        path: /home/user/.bashrc
        marker: "# {mark} ANSIBLE MANAGED: with-proxy"
        create: false
        block: |
          with-proxy() {
              HTTPS_PROXY=http://127.0.0.1:8118 HTTP_PROXY=http://127.0.0.1:8118 "$@"
          }
      become: true
      become_user: user
      tags: [with-proxy, user-bashrc, privoxy]

    # -----------------------------------------------------------------------
    # Privoxy — HTTP→SOCKS5 мост для локального SOCKS5 (throne на 127.0.0.1:2080).
    # Сама конфигурация + enable — здесь. Но использовать privoxy в ansible как
    # HTTPS_PROXY можно только ПОСЛЕ настройки throne (подписка, login).
    # См. play-уровень `environment` + флаг `-e use_proxy=true`.
    # -----------------------------------------------------------------------
    - name: Privoxy | forward-socks5 to 127.0.0.1:2080
      ansible.builtin.lineinfile:
        path: /etc/privoxy/config
        line: "forward-socks5 / 127.0.0.1:2080 ."
        state: present
      notify: restart privoxy
      tags: [privoxy]

    - name: Privoxy | enable + start service
      ansible.builtin.systemd:
        name: privoxy
        enabled: true
        state: started
      tags: [privoxy]

    # -----------------------------------------------------------------------
    # JetBrainsMono Nerd Font (patched font with dev icons) — for kitty/qtile
    # Moved here from preseed late_command because GitHub CDN redirect был
    # ненадёжен в installer chroot (curl returned 404 randomly). В ansible
    # легче retry при неудаче: --tags nerd-font.
    # -----------------------------------------------------------------------
    - name: Nerd Font | directory
      ansible.builtin.file:
        path: /usr/local/share/fonts/JetBrainsMono-Nerd
        state: directory
        mode: "0755"
      tags: [nerd-font]

    - name: Nerd Font | query latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest
        return_content: true
      register: nf_release
      tags: [nerd-font]

    - name: Nerd Font | resolve tar.xz URL
      ansible.builtin.set_fact:
        nf_tar_url: >-
          {{
            nf_release.json.assets
            | selectattr('name', 'equalto', 'JetBrainsMono.tar.xz')
            | map(attribute='browser_download_url')
            | first
          }}
      tags: [nerd-font]

    - name: Nerd Font | download tarball
      ansible.builtin.get_url:
        url: "{{ nf_tar_url }}"
        dest: /tmp/JetBrainsMono-Nerd.tar.xz
        mode: "0644"
      tags: [nerd-font]

    - name: Nerd Font | extract to /usr/local/share/fonts/JetBrainsMono-Nerd
      ansible.builtin.unarchive:
        src: /tmp/JetBrainsMono-Nerd.tar.xz
        dest: /usr/local/share/fonts/JetBrainsMono-Nerd
        remote_src: true
        creates: /usr/local/share/fonts/JetBrainsMono-Nerd/JetBrainsMonoNerdFont-Regular.ttf
      tags: [nerd-font]

    - name: Nerd Font | fc-cache
      ansible.builtin.command: fc-cache -f
      changed_when: false
      tags: [nerd-font]

    # -----------------------------------------------------------------------
    # User scripts — ~/.local/bin/ (ffmpeg-based capture, etc.)
    # -----------------------------------------------------------------------
    - name: User scripts | ensure ~/.local/bin exists
      ansible.builtin.file:
        path: /home/user/.local/bin
        state: directory
        owner: user
        group: user
        mode: "0755"
      tags: [user-scripts, capture]

    - name: User scripts | deploy capture (screen + audio recording)
      ansible.builtin.copy:
        src: capture.sh
        dest: /home/user/.local/bin/capture
        owner: user
        group: user
        mode: "0755"
      tags: [user-scripts, capture]

    # -----------------------------------------------------------------------
    # Cleanup downloaded .debs
    # -----------------------------------------------------------------------
    - name: Cleanup | remove downloaded .deb/tarball files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/vscode.deb
        - /tmp/dbgate.deb
        - /tmp/obsidian.deb
        - /tmp/chezmoi.deb
        - /tmp/bruno.deb
        - /tmp/throne.zip
        - /tmp/postman.tar.gz
        - /tmp/telegram.tar.xz
        - /tmp/JetBrainsMono-Nerd.tar.xz
      tags: [cleanup]

  handlers:
    - name: restart privoxy
      ansible.builtin.systemd:
        name: privoxy
        state: restarted
